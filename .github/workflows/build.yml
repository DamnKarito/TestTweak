name: Build DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build TestTweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: theos/theos-action@v1
        with:
          toolchain-cache: true

      - name: Build Package
        run: |
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: TestTweak-deb
          path: packages/*.deb
          if-no-files-found: warn
          retention-days: 30
